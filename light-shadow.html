<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light&Shadow | Merve Kılıç</title>
    <style>
      /* 1. SAYFA GENELİ */
      body {
        background-color: #000;
        color: #fff;
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 40px;
      }

      /* 2. GERİ DÖN BUTONU */
      .back-button {
        display: inline-block;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.6);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 5px 0;
        font-size: 20px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 60px;
        transition: all 0.4s ease;
      }

      .back-button:hover {
        color: #fff;
        border-bottom: 1px solid #fff;
        padding-left: 10px; /* Fareyle üzerine gelince sağa kayma efekti */
      }

      /* 1. Kapsayıcıdaki taşmaları engelle */
      .gallery {
        column-count: 3;
        column-gap: 20px;
        padding-bottom: 50px;
        /* Ekstra güvenlik satırı: */
        perspective: 1000px;
      }

      /* 2. Resimlerin kutusunu sabitle */
      .gallery-item {
        display: inline-block;
        width: 100%;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 0.8s ease-out forwards;

        /* ÇÖZÜM BURADA: Tarayıcıya bu elementin bir katman olduğunu bildir */
        backface-visibility: hidden;
        -webkit-column-break-inside: avoid; /* Resmin sütun arasında bölünmesini engeller */
        break-inside: avoid;
      }

      /* 3. Hover efektini sadeleştir ve zorla */
      .gallery-item img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        /* Resmin kaybolmasını engelleyen en önemli satır: */
        transform: translateZ(0);
        will-change: transform;
      }

      .gallery-item:hover img {
        /* Ölçeği çok az küçültüyoruz (1.03 -> 1.02) daha stabil olması için */
        transform: scale(1.02) translateZ(0);
        opacity: 1 !important;
      }

      /* Animasyon bittikten sonra görünür kalmasını sağlayan komut */
      .gallery-item {
        display: inline-block;
        width: 100%;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(30px);
        /* forwards komutu animasyon bittiğinde son halini (opacity:1) korur */
        animation: slideUp 0.8s ease-out forwards;
      }

      /* 4. SIRALI GİRİŞ ANİMASYONU (Delay) */
      .gallery-item:nth-child(1) {
        animation-delay: 0.1s;
      }
      .gallery-item:nth-child(2) {
        animation-delay: 0.2s;
      }
      .gallery-item:nth-child(3) {
        animation-delay: 0.3s;
      }
      .gallery-item:nth-child(4) {
        animation-delay: 0.4s;
      }
      .gallery-item:nth-child(5) {
        animation-delay: 0.5s;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 5. MOBİL UYUMLULUK */
      @media (max-width: 900px) {
        .gallery {
          column-count: 2;
        }
      }
      @media (max-width: 600px) {
        .gallery {
          column-count: 1;
        }
      }
      /* Dil Butonları Sabitleme */
      .lang-switcher {
        position: fixed;
        right: 40px;
        top: 35px;
        display: flex;
        gap: 12px;
        font-size: 11px;
        letter-spacing: 2px;
        z-index: 9999;
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.4;
        color: white;
        transition: all 0.3s ease;
      }

      .lang-switcher span.active,
      .lang-switcher span:hover {
        opacity: 1;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      .lang-switcher span.active {
        border-bottom: 1px solid white;
      }

      /* Geri Butonu ve Morluk Engelleme */
      #back-to-portfolio,
      .back-button,
      .back-button:visited {
        color: rgba(255, 255, 255, 0.6) !important;
        text-decoration: none;
        transition: all 0.4s ease;
        display: inline-block;
      }

      #back-to-portfolio:hover {
        color: #fff !important;
        padding-left: 10px;
      }
      @media (max-width: 768px) {
        .back-nav,
        .lang-switcher {
          top: 20px;
          font-size: 10px;
        }
        .back-nav {
          left: 20px;
        }
        .lang-switcher {
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="lang-switcher">
      <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
      <span class="separator">|</span>
      <span onclick="setLanguage('en')" id="lang-en">EN</span>
    </div>

    <a href="index.html" class="lang-key back-button" id="back-to-portfolio"
      >← PORTFOLIO</a
    >

    <h1
      class="lang-key"
      id="light-page-title"
      style="letter-spacing: 10px; font-weight: 300; margin-bottom: 50px"
    >
      LIGHT&SHADOW
    </h1>

    <div class="gallery">
      <div class="gallery-item">
        <img src="photoisik1.webp" alt="1" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="photoisik2.webp" alt="2" loading="lazy" decoding="async" />
      </div>
    </div>

    <div
      style="
        margin-top: 100px;
        text-align: center;
        border-top: 1px solid #222;
        padding-top: 50px;
      "
    >
      <p
        class="lang-key"
        id="next-cat-label"
        style="font-size: 20px; letter-spacing: 2px; color: #555"
      >
        NEXT CATEGORY
      </p>
      <a
        href="architectural.html"
        class="lang-key"
        id="next-cat-arch-link"
        style="
          color: #fff;
          text-decoration: none;
          font-size: 2rem;
          letter-spacing: 5px;
          text-transform: uppercase;
        "
      >
        ARCHITECTURAL →
      </a>
    </div>
    <script>
      const translations = {
        en: {
          "back-to-portfolio": "← PORTFOLIO",
          "light-page-title": "LIGHT&SHADOW",
          "next-cat-label": "NEXT CATEGORY",
          "next-cat-arch-link": "ARCHITECTURAL →",
        },
        tr: {
          "back-to-portfolio": "← PORTFOLYO",
          "light-page-title": "IŞIK&GÖLGE",
          "next-cat-label": "SIRADAKİ KATEGORİ",
          "next-cat-arch-link": "MİMARİ →",
        },
      };

      function setLanguage(lang) {
        const elements = document.querySelectorAll(".lang-key");
        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang] && translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        const btnTr = document.getElementById("lang-tr");
        const btnEn = document.getElementById("lang-en");
        if (btnTr && btnEn) {
          btnTr.classList.remove("active");
          btnEn.classList.remove("active");
          const activeBtn = document.getElementById("lang-" + lang);
          if (activeBtn) activeBtn.classList.add("active");
        }
        localStorage.setItem("selectedLang", lang);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);
      });
    </script>
  </body>
</html>
