<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merve Kılıç | Portfolyo</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      /* 1. SAYFA GENELİ */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000; /* Siyah arka plan */
        color: #fff; /* Beyaz yazı */
        font-family: "Arial", sans-serif;
        overflow-x: hidden;
      }
      /* Tüm elemanlar için kutu modelini sabitleyelim */
      * {
        box-sizing: border-box;
      }

      /* 2. ÜST MENÜ (NAVBAR) */
      .navbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between; /* Logo solda, linkler sağda kalır */
        align-items: center;
        padding: 30px 50px;
        box-sizing: border-box;
        z-index: 100;
        transition:
          transform 0.4s ease,
          opacity 0.4s ease;
        z-index: 1000;
      }

      .nav-logo {
        font-size: 1.2rem;
        letter-spacing: 2px;
        font-weight: bold;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 30px;
        margin-left: auto; /* Linkleri sağa doğru iter */
        margin-right: 70px; /* IG ikonuyla arasına boşluk koyar */
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        opacity: 0.8;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1; /* Üzerine gelince parlar */
      }
      .navbar.hidden {
        transform: translateY(-100%);
        opacity: 0;
      }

      /* Hamburger menü butonu */
      .hamburger {
        display: none;
        flex-direction: column;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1.5rem;
        z-index: 1001;
      }

      .hamburger span {
        width: 25px;
        height: 3px;
        background: white;
        margin: 5px 0;
        transition: 0.3s;
        display: block;
      }

      .hamburger.active span:nth-child(1) {
        transform: rotate(45deg) translate(10px, 10px);
      }

      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }

      .hamburger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -7px);
      }

      /* Mobil menü konteyner */
      .mobile-menu {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        z-index: 999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
      }

      .mobile-menu.active {
        display: flex;
      }

      .mobile-menu a,
      .mobile-menu span {
        color: white;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 1.5rem;
        letter-spacing: 2px;
        transition: 0.3s;
        cursor: pointer;
      }

      .mobile-menu a:hover,
      .mobile-menu span:hover {
        opacity: 0.6;
      }

      .mobile-menu-divider {
        width: 50px;
        height: 1px;
        background: rgba(255, 255, 255, 0.3);
        margin: 10px 0;
      }

      .mobile-lang-switcher {
        display: flex;
        gap: 15px;
        font-size: 1.2rem;
        margin-top: 20px;
      }

      .mobile-lang-switcher span {
        opacity: 0.5;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .mobile-lang-switcher span:hover {
        opacity: 1;
      }

      .mobile-lang-switcher span.active {
        opacity: 1;
        border-bottom: 2px solid white;
        padding-bottom: 5px;
      }

      /* 3. GİRİŞ BÖLÜMÜ (HERO) */
      .hero {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: flex-end; /* Yazıyı sağa yaslar */
        align-items: center;
        padding-right: 10%; /* Sağdan estetik boşluk */
        overflow: hidden; /* Sağ taraftaki video taşmasını gizler */
      }

      /* 4. ARKA PLAN VİDEOSU */
      .hero-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 112.4%; /* Sağdan %11 kırpmayı ekrana sığdırmak için genişliği %112.4 yapıyoruz (100% / 0.89) */
        height: 100%;
        object-fit: cover;
        object-position: left center; /* Videonun solunu hizalayarak sağ tarafının kırpılmasını sağlıyoruz */
        opacity: 0.5; /* Yazının netliği için biraz daha kararttık */
        z-index: 1;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      /* 5. YAZI ALANI */
      .hero-text {
        position: relative;
        z-index: 2;
        text-align: right; /* Yazıları kendi içinde sağa hizalar */
        position: relative;
        left: 0; /* Sadece yazıları bağımsız olarak sağa iter */
      }

      h1 {
        font-size: 3.5rem;
        margin: 0;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: bold;
      }

      p {
        font-size: 1.2rem;
        letter-spacing: 8px;
        margin-top: 10px;
        color: #ccc;
      }
      /* 📸 6. GALERİ TASARIMI (RECENT WORKS) - GÜNCEL VE ORTALANMIŞ */
      .recent-works {
        padding: 80px 0; /* Üstten daha ferah bir boşluk bıraktık */
        background-color: #000;
        text-align: center;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .section-title {
        font-size: 2.5rem;
        font-weight: 300;
        letter-spacing: 5px;
        margin-bottom: 60px;
        text-transform: uppercase;
        padding: 0 40px;
      }

      .works-grid {
        display: grid;
        /* Sabit 4 yerine elemanları ortalayan esnek yapı */
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        width: 100%;
        max-width: 1600px; /* Geniş ekranlarda kategorilerin aşırı yayılmasını önler */
        margin: 0 auto !important; /* Izgarayı merkeze çiviler */
        justify-content: center !important; /* Elemanları içeride ortalar */
        padding: 0 40px;
      }

      .work-item {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3; /* Fujifilm X-T5'in o dikey estetiğini korur */
        overflow: hidden;
        cursor: pointer;
        background-color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-drag: none;
      }

      .work-item img {
        width: 100%; /* Beyaz boşlukları kapatmak için %100 yaptık */
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        filter: grayscale(100%);
        pointer-events: none;
      }

      .work-item:hover img {
        transform: scale(1.08); /* Yumuşak bir odaklanma efekti */
        filter: grayscale(0%);
      }

      /* Yazı Katmanı (Overlay) Düzenlemesi */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(
          0,
          0,
          0,
          0.5
        ); /* Fotoğrafı hafifçe karartarak yazıyı ön plana çıkarır */
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 1; /* Yazı her zaman görünsün */
        transition: background 0.3s ease;
      }

      /* Kategori Başlık Yazısı Stili */
      .work-overlay span {
        color: #ffffff !important; /* Yazı rengini tam beyaz yapıyoruz */
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
        text-align: center;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8); /* Yazının arkasına hafif gölge ekleyerek netliği artırır */
      }

      /* Üzerine gelince (Hover) efekti */
      .work-item:hover .work-overlay {
        background: rgba(
          0,
          0,
          0,
          0.2
        ); /* Üzerine gelince fotoğraf biraz daha aydınlanır */
      }

      /* ✨ ETKİLEŞİM: Üzerine gelince fotoğraf hafif büyüsün */
      .work-item:hover img {
        transform: scale(1.1);
      }
      /* Scroll buttons (mobile) */
      .works-wrapper {
        position: relative;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        overflow: hidden;
      }

      /* Custom circular navigation buttons for the infinite slider */
      .scroll-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.15);
        width: 46px;
        height: 46px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        cursor: pointer;
        z-index: 50;
        opacity: 0;
        pointer-events: auto;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease,
          background-color 0.3s ease,
          border-color 0.3s ease;
      }

      .works-wrapper:hover .scroll-btn {
        opacity: 1;
      }

      .scroll-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
        transform: translateY(-50%) scale(1.1);
      }

      .scroll-btn.left {
        left: 20px;
      }
      .scroll-btn.right {
        right: 20px;
      }

      /* Hardware-accelerated flex track for seamless infinite slider */
      .works-grid {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 20px;
        padding: 20px 40px;
        width: max-content;
        align-items: stretch;
        cursor: grab;
        will-change: transform;
      }

      .work-item {
        position: relative;
        width: 280px;
        min-width: 280px;
        flex-shrink: 0;
        aspect-ratio: 2/3; /* Orantıyı koru ve tek satırda düzgün görünsün */
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Üzerine gelince kategori isminin görünümü */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none; /* Altındaki kaydırma işlemini engellemez */
        transition: 0.3s;
      }

      .work-overlay span {
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
      }

      .work-item:hover .work-overlay {
        background: rgba(0, 0, 0, 0.2); /* Üzerine gelince biraz aydınlanır */
      }
      /* Yazıların başlangıç hali (görünmez ve aşağıda) */
      h1,
      p {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 1s ease-out forwards;
      }
      /* Meslek yazısı (p) biraz daha geç gelsin ki estetik dursun */
      .hero-text p {
        animation-delay: 0.5s;
      }

      /* Kayma Animasyonu Tanımı */
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Sosyal Medya İkonu Stili */
      .social-link {
        color: #ffffff; /* Rengi beyaz yap */
        font-size: 2rem; /* Boyutu büyüt (İstediğin gibi değiştirebilirsin: 1.2rem, 2rem vs.) */
        text-decoration: none; /* Alt çizgiyi kaldır */
        transition: all 0.3s ease; /* Yumuşak geçiş efekti */
        display: flex; /* Hizalama için */
        align-items: center;
        margin-right: 50px;
      }

      /* Üzerine gelince ne olsun? */
      .social-link:hover {
        color: #cccccc; /* Rengi hafif grileştir */
        transform: translateY(-3px); /* Hafifçe yukarı hareket ettir */
      }
      .lang-switcher {
        margin-left: 25px;
        font-size: 11px;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.5; /* Seçili olmayanlar daha sönük durur */
        transition: all 0.3s ease;
        position: relative;
        padding-bottom: 2px;
      }

      /* Üzerine gelince parlama */
      .lang-switcher span:hover {
        opacity: 1;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      }

      /* Aktif (Seçili) Dilin Stili */
      .lang-switcher span.active {
        opacity: 1;
        border-bottom: 1px solid white; /* Altına ince bir çizgi çeker */
      }

      .lang-switcher .separator {
        cursor: default;
        opacity: 0.3;
      }
      #nav-contact {
        cursor: pointer;
        transition: opacity 0.3s ease;
      }

      #nav-contact:hover {
        opacity: 0.6; /* Üzerine gelince hafifçe sönerek tepki verir */
      }
      @media (max-width: 768px) {
        /* 1. Navbar düzenlemesi */
        .navbar {
          padding: 15px 20px !important;
          background: transparent !important;
          position: relative !important;
        }

        /* 2. Logoyu küçültüyoruz */
        .nav-logo {
          font-size: 0.85rem !important;
          letter-spacing: 1px !important;
        }

        /* 3. Menü linklerini gizlyoruz */
        .nav-links {
          display: none !important;
        }

        /* 4. Sosyal medya ve Dil seçeneklerini gizle */
        .nav-social,
        .lang-switcher {
          display: none !important;
        }

        /* 5. Hamburger menüyü göster */
        .hamburger {
          display: flex !important;
        }

        /* 6. Ana sayfa yazısını sağ tarafa kaydır ve üste al */
        .hero {
          justify-content: flex-end !important;
          align-items: flex-start !important;
          padding-right: 5% !important;
          padding-top: 100px !important;
          height: 70vh !important;
        }

        .hero-text {
          text-align: right !important;
          width: auto !important;
          left: auto !important;
          z-index: 5 !important;
        }

        h1 {
          font-size: 1.5rem !important;
          letter-spacing: 3px !important;
          margin-bottom: 10px !important;
        }

        p {
          font-size: 0.9rem !important;
          letter-spacing: 3px !important;
        }

        /* 7. Arka plan videosu mobilde ortalı göster */
        .hero-bg {
          transform: none !important; /* Yakınlaştırmayı kapatır */
          width: 112.4% !important; /* Sağdan %11 kırpmayı ekrana sığdır */
          left: 0 !important;
          object-position: left center !important;
          clip-path: none !important;
        }

        /* Mobil/tablet: yatay kaydırılabilir slide (tek satır) */
        .works-grid {
          gap: 15px !important;
          padding: 15px 20px !important;
          -webkit-overflow-scrolling: touch;
          touch-action: pan-x;
        }

        .work-item {
          width: 240px !important;
          min-width: 240px !important;
        }

        .work-overlay span {
          font-size: 0.9rem !important;
          letter-spacing: 2px !important;
        }

        .recent-works {
          padding: 40px 0 !important;
        }

        .section-title {
          font-size: 1.8rem !important;
          margin-bottom: 30px !important;
          padding: 0 20px !important;
        }
      }

      @media (max-width: 480px) {
        /* Çok küçük ekranlar için */
        .navbar {
          padding: 12px 15px !important;
        }

        .nav-logo {
          font-size: 0.75rem !important;
        }

        .hero {
          height: 50vh !important;
          justify-content: flex-end !important;
          align-items: flex-start !important;
          padding-right: 5% !important;
          padding-top: 80px !important;
        }

        .hero-bg {
          width: 112.4% !important; /* Sağdan %11 kırpmayı ekrana sığdır */
          left: 0 !important;
          object-position: left center !important;
          clip-path: none !important;
        }

        .hero-text {
          text-align: right !important;
        }

        h1 {
          font-size: 1.2rem !important;
          letter-spacing: 2px !important;
        }

        p {
          font-size: 0.8rem !important;
          letter-spacing: 2px !important;
        }

        /* Mobilde yatay kaydırılabilir slide (tek satır) */
        .works-grid {
          gap: 12px !important;
          padding: 12px 15px !important;
          -webkit-overflow-scrolling: touch;
          width: 100%;
        }

        .work-item {
          width: 200px !important;
          min-width: 200px !important;
        }

        .section-title {
          font-size: 1.5rem !important;
          padding: 0 20px !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">TheArtOfMerve</div>
      <ul class="nav-links">
        <li>
          <a href="#portfolio" class="lang-key" id="nav-portfolio">Portfolio</a>
        </li>
        <li>
          <a href="about.html" class="nav-link lang-key" id="nav-about"
            >ABOUT</a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="lang-key"
            id="nav-contact"
            style="text-decoration: none; color: inherit"
            >CONTACT</a
          >
        </li>
      </ul>
      <div class="nav-social">
        <a
          href="https://www.instagram.com/mervisualss/"
          target="_blank"
          class="social-link"
        >
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>
      <div class="lang-switcher">
        <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
        <span class="separator">|</span>
        <span onclick="setLanguage('en')" id="lang-en">EN</span>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- Mobil Menü -->
    <div class="mobile-menu" id="mobileMenu">
      <a href="#portfolio" class="lang-key" id="mobile-portfolio">Portfolio</a>
      <a href="about.html" class="lang-key" id="mobile-about">ABOUT</a>
      <a href="contact.html" class="lang-key" id="mobile-contact">CONTACT</a>
      <div class="mobile-menu-divider"></div>
      <a
        href="https://www.instagram.com/mervisualss/"
        target="_blank"
        style="font-size: 1.2rem"
      >
        <i class="fa-brands fa-instagram"></i> Instagram
      </a>
      <div class="mobile-menu-divider"></div>
      <div class="mobile-lang-switcher">
        <span onclick="setLanguage('tr')" id="mobile-lang-tr" class="lang-key"
          >TR</span
        >
        <span class="separator">|</span>
        <span onclick="setLanguage('en')" id="mobile-lang-en" class="lang-key"
          >EN</span
        >
      </div>
    </div>

    <section class="hero">
      <video autoplay muted playsinline class="hero-bg">
        <source src="hero.mp4" type="video/mp4" />
      </video>
      <div class="hero-text">
        <h1>Merve Kılıç</h1>
        <p class="lang-key" id="hero-sub">PHOTOGRAPHY</p>
      </div>
    </section>

    <section id="portfolio" class="recent-works">
      <h2 class="section-title lang-key" id="section-works">Recent Works</h2>
      <div class="works-wrapper">
        <div class="works-grid">
          <a href="architectural.html" class="work-item">
            <img
              src="kapak1.webp"
              alt="mimari"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-arch">architectural</span>
            </div>
          </a>

          <a href="product.html" class="work-item">
            <img src="kapak2.webp" alt="ürün" loading="lazy" decoding="async" />
            <div class="work-overlay">
              <span class="lang-key" id="work-prod">product</span>
            </div>
          </a>

          <a href="nature.html" class="work-item">
            <img src="kapak3.webp" alt="doğa" loading="lazy" decoding="async" />
            <div class="work-overlay">
              <span class="lang-key" id="work-nature">nature</span>
            </div>
          </a>

          <a href="light-shadow.html" class="work-item">
            <img
              src="kapak4.webp"
              alt="ışıkgölge"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-light">light&shadow</span>
            </div>
          </a>

          <a href="street.html" class="work-item">
            <img
              src="kapak5.webp"
              alt="sokak"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-street">street</span>
            </div>
          </a>

          <a href="event.html" class="work-item">
            <img
              src="kapakevent.webp"
              alt="etkinlik"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-event">event</span>
            </div>
          </a>
        </div>
        <button class="scroll-btn left" id="worksPrev" aria-label="Previous">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="scroll-btn right" id="worksNext" aria-label="Next">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </section>
    <script>
      // 1. Sözlüğümüzü hazırlıyoruz (Her ID'nin karşılığını yazıyoruz)
      const translations = {
        en: {
          "nav-portfolio": "Portfolio",
          "nav-about": "ABOUT",
          "nav-contact": "Contact",
          "mobile-portfolio": "Portfolio",
          "mobile-about": "ABOUT",
          "mobile-contact": "Contact",
          "mobile-lang-tr": "TR",
          "mobile-lang-en": "EN",
          "hero-sub": "PHOTOGRAPHY",
          "section-works": "Recent Works",
          "work-arch": "architectural",
          "work-prod": "product",
          "work-nature": "nature",
          "work-light": "light&shadow",
          "work-street": "street",
          "work-event": "event",
        },
        tr: {
          "nav-portfolio": "Portfolyo",
          "nav-about": "HAKKIMDA",
          "nav-contact": "İletişim",
          "mobile-portfolio": "Portfolyo",
          "mobile-about": "HAKKIMDA",
          "mobile-contact": "İletişim",
          "mobile-lang-tr": "TR",
          "mobile-lang-en": "EN",
          "hero-sub": "FOTOĞRAFÇILIK",
          "section-works": "Son Çalışmalar",
          "work-arch": "mimari",
          "work-prod": "ürün",
          "work-nature": "doğa",
          "work-street": "sokak",
          "work-light": "ışık & gölge",
          "work-event": "etkinlik",
        },
      };
      // 2. Dili değiştiren fonksiyon
      function setLanguage(lang) {
        // Tüm 'lang-key' sınıfına sahip öğeleri bul
        const elements = document.querySelectorAll(".lang-key");

        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        // --- YENİ EKLENEN KISIM BURASI ---
        // Önce her iki butondan da 'active' sınıfını çıkarıyoruz
        document.getElementById("lang-tr").classList.remove("active");
        document.getElementById("lang-en").classList.remove("active");
        document.getElementById("mobile-lang-tr").classList.remove("active");
        document.getElementById("mobile-lang-en").classList.remove("active");

        // Sonra seçilen dile (lang) 'active' sınıfını ekliyoruz
        document.getElementById("lang-" + lang).classList.add("active");
        document.getElementById("mobile-lang-" + lang).classList.add("active");
        // Sayfa dilini güncelle (büyük harf dönüşümlerinin doğru yerel kuralla çalışması için)
        document.documentElement.setAttribute("lang", lang);
        // --------------------------------

        // Seçimi hafızaya kaydet
        localStorage.setItem("selectedLang", lang);

        // Mobil menüyü kapat
        const mobileMenu = document.getElementById("mobileMenu");
        const hamburger = document.getElementById("hamburger");
        mobileMenu.classList.remove("active");
        hamburger.classList.remove("active");
      }

      // 3. Sayfa açıldığında son seçilen dili kontrol et ve otomatik scroll başlat
      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);

        // Videonun oynatma hızını biraz yavaşlatıyoruz
        const video = document.querySelector(".hero-bg");
        if (video) {
          video.playbackRate = 1; // Orjinal hızı 1.0 iken yavaşlatmak için 0.6 yapıyoruz
        }
      });
      // Loop slide (infinite carousel) functionality
      document.addEventListener("DOMContentLoaded", () => {
        const grid = document.querySelector(".works-grid");
        if (!grid) return;

        const originalItems = Array.from(grid.querySelectorAll(".work-item"));
        const originalCount = originalItems.length;
        if (originalCount === 0) return;

        // Mark original items
        originalItems.forEach(item => item.classList.add("original-item"));

        // Clone and prepend
        for (let i = originalCount - 1; i >= 0; i--) {
          const clone = originalItems[i].cloneNode(true);
          clone.classList.add("clone-item");
          grid.insertBefore(clone, grid.firstChild);
        }

        // Clone and append
        for (let i = 0; i < originalCount; i++) {
          const clone = originalItems[i].cloneNode(true);
          clone.classList.add("clone-item");
          grid.appendChild(clone);
        }

        const items = Array.from(grid.querySelectorAll(".work-item"));
        const firstOriginal = items[originalCount];
        const firstDuplicate = items[originalCount * 2];

        // Measure boundaries
        let startOffset = 0;
        let loopWidth = 0;

        const measure = () => {
          // Calculate start offset (width of all prepended clones)
          startOffset = firstOriginal.offsetLeft - grid.offsetLeft;
          // Calculate width of one loop (original set of items)
          loopWidth = firstDuplicate.offsetLeft - firstOriginal.offsetLeft;
        };

        measure();

        // Active state tracker (current translate X in pixels)
        let currentTranslate = -startOffset;

        // Apply hardware accelerated transform
        const applyTransform = (tx) => {
          grid.style.transform = `translate3d(${tx}px, 0, 0)`;
        };

        // Initialize position
        applyTransform(currentTranslate);

        // Ensure translations are applied to clones on load
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);

        // Resizing handler
        window.addEventListener("resize", () => {
          const relativeOffset = currentTranslate + startOffset;
          measure();
          currentTranslate = -startOffset + relativeOffset;
          applyTransform(currentTranslate);
        });

        // Loop control flags
        let isDown = false;
        let isHovered = false;
        let isTransitioning = false;
        let transitionTimeout = null;

        // Boundary check function to wrap position seamlessly
        const checkBoundaries = () => {
          // If we scrolled past the right side (too far left, translate value very negative)
          if (currentTranslate <= -(startOffset + loopWidth)) {
            currentTranslate += loopWidth;
          }
          // If we scrolled past the left side (too far right, translate value near 0 or positive)
          else if (currentTranslate > -startOffset) {
            currentTranslate -= loopWidth;
          }
        };

        // Navigation arrow functionality
        const btnNext = document.getElementById("worksNext");
        const btnPrev = document.getElementById("worksPrev");

        const scrollStep = () => {
          const firstItem = items[0];
          const gap = parseFloat(getComputedStyle(grid).gap) || 20;
          return firstItem.offsetWidth + gap;
        };

        const triggerButtonScroll = (direction) => {
          if (isTransitioning) return;
          isTransitioning = true;
          if (transitionTimeout) clearTimeout(transitionTimeout);

          let step = scrollStep();
          let targetTranslate = currentTranslate + (direction === "next" ? -step : step);

          // Add transition class for smooth animation
          grid.style.transition = "transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)";
          currentTranslate = targetTranslate;
          applyTransform(currentTranslate);

          transitionTimeout = setTimeout(() => {
            // Remove transition style so drag and auto-scroll remain instant
            grid.style.transition = "";
            checkBoundaries();
            applyTransform(currentTranslate);
            isTransitioning = false;
            lastTime = performance.now(); // reset timer
          }, 500);
        };

        if (btnNext) {
          btnNext.addEventListener("click", () => triggerButtonScroll("next"));
        }

        if (btnPrev) {
          btnPrev.addEventListener("click", () => triggerButtonScroll("prev"));
        }

        // Continuous smooth scroll flow (tick function)
        let animationFrameId = null;
        const scrollSpeed = 120; // pixels per second (speed is slightly increased for dynamic aesthetic)
        let lastTime = performance.now();

        const tick = (time) => {
          const delta = (time - lastTime) / 1000;
          lastTime = time;

          // Only auto-scroll when not interacting or transitioning
          if (!isDown && !isHovered && !isTransitioning) {
            currentTranslate -= scrollSpeed * delta;
            checkBoundaries();
            applyTransform(currentTranslate);
          }

          animationFrameId = requestAnimationFrame(tick);
        };

        // Start continuous loop flow
        animationFrameId = requestAnimationFrame(tick);

        // Pause continuous flow on hover or touch
        const wrapper = document.querySelector(".works-wrapper");
        if (wrapper) {
          wrapper.addEventListener("pointerenter", () => {
            isHovered = true;
          });
          wrapper.addEventListener("pointerleave", () => {
            isHovered = false;
            lastTime = performance.now();
          });
        }

        // Drag to scroll logic for desktop mouse users
        let startX;
        let dragStartTranslate;
        let hasDragged = false;

        grid.addEventListener("mousedown", (e) => {
          if (isTransitioning) return;
          isDown = true;
          hasDragged = false;
          grid.style.cursor = "grabbing";
          startX = e.pageX;
          dragStartTranslate = currentTranslate;
        });

        document.addEventListener("mouseup", () => {
          if (isDown) {
            isDown = false;
            grid.style.cursor = "grab";
            lastTime = performance.now();
          }
        });

        grid.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          const x = e.pageX;
          const dx = x - startX;
          
          if (Math.abs(dx) > 5) {
            hasDragged = true;
          }

          if (hasDragged) {
            currentTranslate = dragStartTranslate + dx * 1.2;
            checkBoundaries();
            applyTransform(currentTranslate);
          }
        });

        // Touch event handlers for mobile devices
        let touchStartX;
        let touchStartTranslate;

        grid.addEventListener("touchstart", (e) => {
          if (isTransitioning) return;
          isDown = true;
          isHovered = true;
          touchStartX = e.touches[0].clientX;
          touchStartTranslate = currentTranslate;
        }, { passive: true });

        grid.addEventListener("touchmove", (e) => {
          if (!isDown) return;
          const x = e.touches[0].clientX;
          const dx = x - touchStartX;
          
          currentTranslate = touchStartTranslate + dx;
          checkBoundaries();
          applyTransform(currentTranslate);
        }, { passive: true });

        grid.addEventListener("touchend", () => {
          if (isDown) {
            isDown = false;
            isHovered = false;
            lastTime = performance.now();
          }
        }, { passive: true });

        // Intercept and prevent links from navigating if user is dragging
        grid.addEventListener("click", (e) => {
          if (hasDragged) {
            e.preventDefault();
            e.stopPropagation();
          }
        }, true);
      });
      let lastScrollTop = 0;
      const navbar = document.querySelector(".navbar");

      window.addEventListener("scroll", function () {
        let scrollTop =
          window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > lastScrollTop && scrollTop > 50) {
          navbar.classList.add("hidden"); // Aşağı kaydırınca gizle
        } else {
          navbar.classList.remove("hidden"); // Yukarı kaydırınca göster
        }
        lastScrollTop = scrollTop;
      });

      // Hamburger Menü Toggle
      const hamburger = document.getElementById("hamburger");
      const mobileMenu = document.getElementById("mobileMenu");

      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("active");
        mobileMenu.classList.toggle("active");
      });

      // Mobil menü linklerine tıklandığında menüyü kapat
      const mobileMenuLinks = document.querySelectorAll(".mobile-menu a");
      mobileMenuLinks.forEach((link) => {
        link.addEventListener("click", () => {
          hamburger.classList.remove("active");
          mobileMenu.classList.remove("active");
        });
      });
    </script>
  </body>
