<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merve Kılıç | Portfolyo</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      /* 1. SAYFA GENELİ */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000; /* Siyah arka plan */
        color: #fff; /* Beyaz yazı */
        font-family: "Arial", sans-serif;
        overflow-x: hidden;
      }
      /* Tüm elemanlar için kutu modelini sabitleyelim */
      * {
        box-sizing: border-box;
      }

      /* 2. ÜST MENÜ (NAVBAR) */
      .navbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between; /* Logo solda, linkler sağda kalır */
        align-items: center;
        padding: 30px 50px;
        box-sizing: border-box;
        z-index: 100;
        transition:
          transform 0.4s ease,
          opacity 0.4s ease;
        z-index: 1000;
      }

      .nav-logo {
        font-size: 1.2rem;
        letter-spacing: 2px;
        font-weight: bold;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 30px;
        margin-left: auto; /* Linkleri sağa doğru iter */
        margin-right: 70px; /* IG ikonuyla arasına boşluk koyar */
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        opacity: 0.8;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1; /* Üzerine gelince parlar */
      }
      .navbar.hidden {
        transform: translateY(-100%);
        opacity: 0;
      }

      /* Hamburger menü butonu */
      .hamburger {
        display: none;
        flex-direction: column;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1.5rem;
        z-index: 1001;
      }

      .hamburger span {
        width: 25px;
        height: 3px;
        background: white;
        margin: 5px 0;
        transition: 0.3s;
        display: block;
      }

      .hamburger.active span:nth-child(1) {
        transform: rotate(45deg) translate(10px, 10px);
      }

      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }

      .hamburger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -7px);
      }

      /* Mobil menü konteyner */
      .mobile-menu {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        z-index: 999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
      }

      .mobile-menu.active {
        display: flex;
      }

      .mobile-menu a,
      .mobile-menu span {
        color: white;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 1.5rem;
        letter-spacing: 2px;
        transition: 0.3s;
        cursor: pointer;
      }

      .mobile-menu a:hover,
      .mobile-menu span:hover {
        opacity: 0.6;
      }

      .mobile-menu-divider {
        width: 50px;
        height: 1px;
        background: rgba(255, 255, 255, 0.3);
        margin: 10px 0;
      }

      .mobile-lang-switcher {
        display: flex;
        gap: 15px;
        font-size: 1.2rem;
        margin-top: 20px;
      }

      .mobile-lang-switcher span {
        opacity: 0.5;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .mobile-lang-switcher span:hover {
        opacity: 1;
      }

      .mobile-lang-switcher span.active {
        opacity: 1;
        border-bottom: 2px solid white;
        padding-bottom: 5px;
      }

      /* 3. GİRİŞ BÖLÜMÜ (HERO) */
      .hero {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: flex-end; /* Yazıyı sağa yaslar */
        align-items: center;
        padding-right: 10%; /* Sağdan estetik boşluk */
      }

      /* 4. ARKA PLAN FOTOĞRAFI */
      .hero-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 20% center; /* Fotoğrafı sola kaydırır */
        opacity: 0.5; /* Yazının netliği için biraz daha kararttık */
        z-index: 1;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      /* 5. YAZI ALANI */
      .hero-text {
        position: relative;
        z-index: 2;
        text-align: right; /* Yazıları kendi içinde sağa hizalar */
        position: relative;
        left: 0; /* Sadece yazıları bağımsız olarak sağa iter */
      }

      h1 {
        font-size: 3.5rem;
        margin: 0;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: bold;
      }

      p {
        font-size: 1.2rem;
        letter-spacing: 8px;
        margin-top: 10px;
        color: #ccc;
      }
      /* 📸 6. GALERİ TASARIMI (RECENT WORKS) - GÜNCEL VE ORTALANMIŞ */
      .recent-works {
        padding: 80px 20px; /* Üstten daha ferah bir boşluk bıraktık */
        background-color: #000;
        text-align: center;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .section-title {
        font-size: 2.5rem;
        font-weight: 300;
        letter-spacing: 5px;
        margin-bottom: 60px;
        text-transform: uppercase;
      }

      .works-grid {
        display: grid;
        /* Sabit 4 yerine elemanları ortalayan esnek yapı */
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        width: 100%;
        max-width: 1600px; /* Geniş ekranlarda kategorilerin aşırı yayılmasını önler */
        margin: 0 auto !important; /* Izgarayı merkeze çiviler */
        justify-content: center !important; /* Elemanları içeride ortalar */
        padding: 0 40px;
      }

      .work-item {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3; /* Fujifilm X-T5'in o dikey estetiğini korur */
        overflow: hidden;
        cursor: pointer;
        background-color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .work-item img {
        width: 100%; /* Beyaz boşlukları kapatmak için %100 yaptık */
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .work-item:hover img {
        transform: scale(1.08); /* Yumuşak bir odaklanma efekti */
      }

      /* Yazı Katmanı (Overlay) Düzenlemesi */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(
          0,
          0,
          0,
          0.5
        ); /* Fotoğrafı hafifçe karartarak yazıyı ön plana çıkarır */
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 1; /* Yazı her zaman görünsün */
        transition: background 0.3s ease;
      }

      /* Kategori Başlık Yazısı Stili */
      .work-overlay span {
        color: #ffffff !important; /* Yazı rengini tam beyaz yapıyoruz */
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
        text-align: center;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8); /* Yazının arkasına hafif gölge ekleyerek netliği artırır */
      }

      /* Üzerine gelince (Hover) efekti */
      .work-item:hover .work-overlay {
        background: rgba(
          0,
          0,
          0,
          0.2
        ); /* Üzerine gelince fotoğraf biraz daha aydınlanır */
      }

      /* ✨ ETKİLEŞİM: Üzerine gelince fotoğraf hafif büyüsün */
      .work-item:hover img {
        transform: scale(1.1);
      }
      /* Scroll buttons (mobile) */
      .works-wrapper {
        position: relative;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Visual scrollbar under the works grid (mobile) - minimal */
      .works-scrollbar {
        display: none; /* shown on mobile via media query */
        position: absolute; /* will be positioned to match grid */
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 3px;
        overflow: hidden;
        touch-action: none; /* allow pointer dragging */
        will-change: transform, opacity, width;
      }

      .works-scrollbar-thumb {
        width: 12%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        border-radius: 3px;
        transform: translateX(0%);
        transition:
          width 220ms ease,
          opacity 220ms ease;
        opacity: 0.8;
        cursor: grab;
        will-change: transform, width;
      }

      .works-scrollbar-thumb:active {
        cursor: grabbing;
      }

      .scroll-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.08);
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: none; /* Varsayılan gizli, mobilde gösterilecek */
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
        z-index: 50;
        opacity: 0.7;
        box-shadow: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease,
          background 0.18s ease;
      }

      .scroll-btn:hover {
        opacity: 1;
        transform: translateY(-50%) scale(1.04);
        background: rgba(255, 255, 255, 0.06);
      }

      .scroll-btn.left {
        left: 8px;
      }
      .scroll-btn.right {
        right: 8px;
      }
      /* Galeriyi tek satırda düzgün ortalamak ve orantılı yapmak için */
      .works-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr)); /* 5 eşit sütun */
        gap: 20px;
        padding: 20px;
        max-width: 1400px;
        margin: 0 auto; /* Ortala */
        justify-items: stretch; /* Her sütunu doldursun */
        align-items: stretch;
        scroll-behavior: smooth;
      }

      .work-item {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3; /* Orantıyı koru ve tek satırda düzgün görünsün */
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Üzerine gelince kategori isminin görünümü */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none; /* Altındaki kaydırma işlemini engellemez */
        transition: 0.3s;
      }

      .work-overlay span {
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
      }

      .work-item:hover .work-overlay {
        background: rgba(0, 0, 0, 0.2); /* Üzerine gelince biraz aydınlanır */
      }
      /* Yazıların başlangıç hali (görünmez ve aşağıda) */
      h1,
      p {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 1s ease-out forwards;
      }
      /* Meslek yazısı (p) biraz daha geç gelsin ki estetik dursun */
      .hero-text p {
        animation-delay: 0.5s;
      }

      /* Kayma Animasyonu Tanımı */
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Sosyal Medya İkonu Stili */
      .social-link {
        color: #ffffff; /* Rengi beyaz yap */
        font-size: 2rem; /* Boyutu büyüt (İstediğin gibi değiştirebilirsin: 1.2rem, 2rem vs.) */
        text-decoration: none; /* Alt çizgiyi kaldır */
        transition: all 0.3s ease; /* Yumuşak geçiş efekti */
        display: flex; /* Hizalama için */
        align-items: center;
        margin-right: 50px;
      }

      /* Üzerine gelince ne olsun? */
      .social-link:hover {
        color: #cccccc; /* Rengi hafif grileştir */
        transform: translateY(-3px); /* Hafifçe yukarı hareket ettir */
      }
      .lang-switcher {
        margin-left: 25px;
        font-size: 11px;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.5; /* Seçili olmayanlar daha sönük durur */
        transition: all 0.3s ease;
        position: relative;
        padding-bottom: 2px;
      }

      /* Üzerine gelince parlama */
      .lang-switcher span:hover {
        opacity: 1;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      }

      /* Aktif (Seçili) Dilin Stili */
      .lang-switcher span.active {
        opacity: 1;
        border-bottom: 1px solid white; /* Altına ince bir çizgi çeker */
      }

      .lang-switcher .separator {
        cursor: default;
        opacity: 0.3;
      }
      #nav-contact {
        cursor: pointer;
        transition: opacity 0.3s ease;
      }

      #nav-contact:hover {
        opacity: 0.6; /* Üzerine gelince hafifçe sönerek tepki verir */
      }
      @media (max-width: 768px) {
        /* 1. Navbar düzenlemesi */
        .navbar {
          padding: 15px 20px !important;
          background: transparent !important;
          position: relative !important;
        }

        /* 2. Logoyu küçültüyoruz */
        .nav-logo {
          font-size: 0.85rem !important;
          letter-spacing: 1px !important;
        }

        /* 3. Menü linklerini gizlyoruz */
        .nav-links {
          display: none !important;
        }

        /* 4. Sosyal medya ve Dil seçeneklerini gizle */
        .nav-social,
        .lang-switcher {
          display: none !important;
        }

        /* 5. Hamburger menüyü göster */
        .hamburger {
          display: flex !important;
        }

        /* 6. Ana sayfa yazısını ortala */
        .hero {
          justify-content: center !important;
          align-items: center !important;
          padding-right: 0 !important;
          height: 70vh !important;
        }

        .hero-text {
          text-align: center !important;
          width: 100% !important;
          padding: 0 20px !important;
          left: 0 !important;
          z-index: 5 !important;
        }

        h1 {
          font-size: 1.5rem !important;
          letter-spacing: 3px !important;
          margin-bottom: 10px !important;
        }

        p {
          font-size: 0.9rem !important;
          letter-spacing: 3px !important;
        }

        /* 7. Arka plan fotoğrafı mobilde ortala */
        .hero-bg {
          object-position: center !important;
        }

        /* Mobil/tablet: yatay kaydırılabilir slide (tek satır) */
        .works-grid {
          display: flex !important;
          flex-direction: row;
          gap: 18px !important;
          overflow-x: auto !important;
          padding: 10px 20px !important;
          padding-left: 0 !important; /* İlk kategori ekranın başından başlasın */
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
          width: 100%;
          scroll-behavior: smooth;
          touch-action: pan-x;
          justify-content: flex-start !important;
        }

        /* show visual scrollbar on mobile */
        .works-scrollbar {
          display: block !important;
        }

        /* Ok düğmelerini mobilde göster */
        .scroll-btn {
          display: flex !important;
        }

        .works-grid::-webkit-scrollbar {
          display: none;
        }

        .work-item {
          flex: 0 0 220px !important; /* Mobilde biraz daha küçük genişlik */
          height: 230px !important;
          scroll-snap-align: start;
        }
        /* İçerik konteyneri soldan boşluk bırakıyorsa sıfırlıyoruz */
        .recent-works {
          padding-left: 0 !important;
        }

        .work-overlay span {
          font-size: 0.9rem !important;
          letter-spacing: 2px !important;
        }

        .recent-works {
          padding: 40px 20px !important;
        }

        .section-title {
          font-size: 1.8rem !important;
          margin-bottom: 30px !important;
        }
      }

      @media (max-width: 480px) {
        /* Çok küçük ekranlar için */
        .navbar {
          padding: 12px 15px !important;
        }

        .nav-logo {
          font-size: 0.75rem !important;
        }

        .hero {
          height: 50vh !important;
        }

        h1 {
          font-size: 1.2rem !important;
          letter-spacing: 2px !important;
        }

        p {
          font-size: 0.8rem !important;
          letter-spacing: 2px !important;
        }

        /* Mobilde yatay kaydırılabilir slide (tek satır) */
        .works-grid {
          display: flex !important;
          flex-direction: row;
          gap: 16px !important;
          overflow-x: auto !important;
          padding: 10px 16px !important;
          padding-left: 0 !important; /* İlk kategori soldan görünür olsun */
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
          width: 100%;
          justify-content: flex-start !important;
        }

        /* Gizli kaydırma çubuğu (isteğe bağlı, estetik için) */
        .works-grid::-webkit-scrollbar {
          display: none;
        }

        .work-item {
          flex: 0 0 200px !important; /* Daha küçük kartlar */
          height: 300px !important;
          scroll-snap-align: start;
        }
        .recent-works {
          padding-left: 0 !important;
        }

        .section-title {
          font-size: 1.5rem !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">TheArtOfMerve</div>
      <ul class="nav-links">
        <li>
          <a href="#portfolio" class="lang-key" id="nav-portfolio">Portfolio</a>
        </li>
        <li>
          <a href="about.html" class="nav-link lang-key" id="nav-about"
            >ABOUT</a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="lang-key"
            id="nav-contact"
            style="text-decoration: none; color: inherit"
            >CONTACT</a
          >
        </li>
      </ul>
      <div class="nav-social">
        <a
          href="https://www.instagram.com/mervisualss/"
          target="_blank"
          class="social-link"
        >
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>
      <div class="lang-switcher">
        <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
        <span class="separator">|</span>
        <span onclick="setLanguage('en')" id="lang-en">EN</span>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- Mobil Menü -->
    <div class="mobile-menu" id="mobileMenu">
      <a href="#portfolio" class="lang-key" id="mobile-portfolio">Portfolio</a>
      <a href="about.html" class="lang-key" id="mobile-about">ABOUT</a>
      <a href="contact.html" class="lang-key" id="mobile-contact">CONTACT</a>
      <div class="mobile-menu-divider"></div>
      <a
        href="https://www.instagram.com/mervisualss/"
        target="_blank"
        style="font-size: 1.2rem"
      >
        <i class="fa-brands fa-instagram"></i> Instagram
      </a>
      <div class="mobile-menu-divider"></div>
      <div class="mobile-lang-switcher">
        <span onclick="setLanguage('tr')" id="mobile-lang-tr" class="lang-key"
          >TR</span
        >
        <span class="separator">|</span>
        <span onclick="setLanguage('en')" id="mobile-lang-en" class="lang-key"
          >EN</span
        >
      </div>
    </div>

    <section class="hero">
      <img
        src="back.webp"
        class="hero-bg"
        alt="Kapak Fotoğrafı"
        loading="eager"
        decoding="async"
      />
      <div class="hero-text">
        <h1>Merve Kılıç</h1>
        <p class="lang-key" id="hero-sub">PHOTOGRAPHY</p>
      </div>
    </section>

    <section id="portfolio" class="recent-works">
      <h2 class="section-title lang-key" id="section-works">Recent Works</h2>
      <div class="works-wrapper">
        <div class="works-grid">
          <a href="architectural.html" class="work-item">
            <img
              src="kapak1.webp"
              alt="mimari"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-arch">architectural</span>
            </div>
          </a>

          <a href="product.html" class="work-item">
            <img src="kapak2.webp" alt="ürün" loading="lazy" decoding="async" />
            <div class="work-overlay">
              <span class="lang-key" id="work-prod">product</span>
            </div>
          </a>

          <a href="nature.html" class="work-item">
            <img src="kapak3.webp" alt="doğa" loading="lazy" decoding="async" />
            <div class="work-overlay">
              <span class="lang-key" id="work-nature">nature</span>
            </div>
          </a>

          <a href="light-shadow.html" class="work-item">
            <img
              src="kapak4.webp"
              alt="ışıkgölge"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-light">light&shadow</span>
            </div>
          </a>

          <a href="street.html" class="work-item">
            <img
              src="kapak5.webp"
              alt="sokak"
              loading="lazy"
              decoding="async"
            />
            <div class="work-overlay">
              <span class="lang-key" id="work-street">street</span>
            </div>
          </a>
        </div>
        <div class="works-scrollbar" id="worksScrollbar" aria-hidden="true">
          <div class="works-scrollbar-thumb" id="worksScrollbarThumb"></div>
        </div>
      </div>
    </section>
    <script>
      // 1. Sözlüğümüzü hazırlıyoruz (Her ID'nin karşılığını yazıyoruz)
      const translations = {
        en: {
          "nav-portfolio": "Portfolio",
          "nav-about": "ABOUT",
          "nav-contact": "Contact",
          "mobile-portfolio": "Portfolio",
          "mobile-about": "ABOUT",
          "mobile-contact": "Contact",
          "mobile-lang-tr": "TR",
          "mobile-lang-en": "EN",
          "hero-sub": "PHOTOGRAPHY",
          "section-works": "Recent Works",
          "work-arch": "architectural",
          "work-prod": "product",
          "work-nature": "nature",
          "work-light": "light&shadow",
          "work-street": "street",
        },
        tr: {
          "nav-portfolio": "Portfolyo",
          "nav-about": "HAKKIMDA",
          "nav-contact": "İletişim",
          "mobile-portfolio": "Portfolyo",
          "mobile-about": "HAKKIMDA",
          "mobile-contact": "İletişim",
          "mobile-lang-tr": "TR",
          "mobile-lang-en": "EN",
          "hero-sub": "FOTOĞRAFÇILIK",
          "section-works": "Son Çalışmalar",
          "work-arch": "mimari",
          "work-prod": "ürün",
          "work-nature": "doğa",
          "work-street": "sokak",
          "work-light": "ışık & gölge",
        },
      };
      // 2. Dili değiştiren fonksiyon
      function setLanguage(lang) {
        // Tüm 'lang-key' sınıfına sahip öğeleri bul
        const elements = document.querySelectorAll(".lang-key");

        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        // --- YENİ EKLENEN KISIM BURASI ---
        // Önce her iki butondan da 'active' sınıfını çıkarıyoruz
        document.getElementById("lang-tr").classList.remove("active");
        document.getElementById("lang-en").classList.remove("active");
        document.getElementById("mobile-lang-tr").classList.remove("active");
        document.getElementById("mobile-lang-en").classList.remove("active");

        // Sonra seçilen dile (lang) 'active' sınıfını ekliyoruz
        document.getElementById("lang-" + lang).classList.add("active");
        document.getElementById("mobile-lang-" + lang).classList.add("active");
        // --------------------------------

        // Seçimi hafızaya kaydet
        localStorage.setItem("selectedLang", lang);

        // Mobil menüyü kapat
        const mobileMenu = document.getElementById("mobileMenu");
        const hamburger = document.getElementById("hamburger");
        mobileMenu.classList.remove("active");
        hamburger.classList.remove("active");
      }

      // 3. Sayfa açıldığında son seçilen dili kontrol et
      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);
      });
      // İlk açılışta architectural kategorisini göster
      document.addEventListener("DOMContentLoaded", () => {
        const grid = document.querySelector(".works-grid");
        const archLabel = document.getElementById("work-arch");
        if (grid && archLabel) {
          const archItem = archLabel.closest(".work-item");
          if (archItem) {
            // Hesaplamayı grid/viewport farkına göre yapıp küçük bir gecikme ile uygula
            setTimeout(() => {
              const gridRect = grid.getBoundingClientRect();
              const itemRect = archItem.getBoundingClientRect();
              const relativeLeft = itemRect.left - gridRect.left;
              const target = Math.max(0, grid.scrollLeft + relativeLeft);
              grid.scrollTo({ left: target, behavior: "smooth" });
            }, 60);
          }
        }

        // Sayfaya girildiğinde kullanıcıya kaydırılabilir olduğunu göstermek için
        // mobil/tablet'de (<=768px) bir kere sağa doğru kısa bir nudge yap
        try {
          const firstItem = grid ? grid.querySelector(".work-item") : null;
          const computedGap = grid
            ? parseFloat(getComputedStyle(grid).gap) || 0
            : 0;
          const itemWidth = firstItem
            ? firstItem.offsetWidth
            : Math.round((grid ? grid.clientWidth : 0) * 0.6);
          const nudgeAmount = Math.max(
            60,
            Math.round(itemWidth * 0.45 + computedGap),
          );

          if (
            grid &&
            window.innerWidth <= 768 &&
            !localStorage.getItem("worksNudgeShown")
          ) {
            // Daha belirgin, daha yavaş ve 2 kere tekrarlayan nudge
            const initialDelay = 500; // başlangıç gecikmesi
            const moveDelay = 1000; // kayma hareketleri arası bekleme (daha yavaş)
            const returnDelay = 1000; // geri dönüş beklemesi

            // İşaret gösterimi başlatıldığında tekrar göstermemek için işaretle
            localStorage.setItem("worksNudgeShown", "1");

            setTimeout(() => {
              // Eğer gerçek yatay kaydırma mümkünse scrollBy ile nudge yap
              const canScroll = grid.scrollWidth > grid.clientWidth + 2;

              const doScrollNudge = () => {
                // 1. nudge --> sağa
                grid.scrollBy({ left: nudgeAmount, behavior: "smooth" });

                // geri al
                setTimeout(() => {
                  grid.scrollBy({ left: -nudgeAmount, behavior: "smooth" });
                }, returnDelay);

                // 2. nudge (biraz sonra tekrar)
                setTimeout(() => {
                  grid.scrollBy({ left: nudgeAmount, behavior: "smooth" });

                  // ikinci geri dönüş
                  setTimeout(() => {
                    grid.scrollBy({ left: -nudgeAmount, behavior: "smooth" });
                  }, returnDelay);
                }, moveDelay + returnDelay);
              };

              const doTransformNudge = () => {
                // Görsel fallback: transform ile kaydırma taklidi yap
                const prevTransition = grid.style.transition;
                const prevTransform = grid.style.transform;
                grid.style.transition = `transform ${Math.max(600, returnDelay)}ms ease`;
                grid.style.transform = `translateX(${nudgeAmount}px)`;

                setTimeout(() => {
                  grid.style.transform = prevTransform || "translateX(0)";
                }, returnDelay);

                // 2. tekrar
                setTimeout(() => {
                  grid.style.transform = `translateX(${nudgeAmount}px)`;
                  setTimeout(() => {
                    grid.style.transform = prevTransform || "translateX(0)";
                    // restore transition after small delay
                    setTimeout(() => {
                      grid.style.transition = prevTransition || "";
                    }, 200);
                  }, returnDelay);
                }, moveDelay + returnDelay);
              };

              if (canScroll) {
                doScrollNudge();
              } else {
                doTransformNudge();
              }
            }, initialDelay);
          }
        } catch (e) {
          // Hata varsa sessizce yoksay
          console.warn("works nudge error", e);
        }
        // Visual scrollbar update (mobile) + draggable thumb
        (function () {
          const grid = document.querySelector(".works-grid");
          const thumb = document.getElementById("worksScrollbarThumb");
          const scrollbar = document.getElementById("worksScrollbar");

          if (!grid || !thumb || !scrollbar) return;

          let rafId = null;
          const update = () => {
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(() => {
              const scrollWidth = grid.scrollWidth;
              const clientW = grid.clientWidth;
              // position & size scrollbar to match grid
              const wrapper = grid.parentElement; // .works-wrapper
              if (wrapper && scrollbar) {
                // set width to grid's inner width and left relative to wrapper
                const left = grid.offsetLeft || 0;
                scrollbar.style.left = left + "px";
                scrollbar.style.width = clientW + "px";
                // place just under grid using bottom to avoid layout thrash
                scrollbar.style.bottom = "8px";
              }

              if (scrollWidth <= clientW + 2) {
                scrollbar.style.opacity = "0";
                return;
              }
              scrollbar.style.opacity = "1";
              const thumbRatio = clientW / scrollWidth;
              const thumbPercent = Math.max(0.03, Math.min(1, thumbRatio));
              const leftRatio = grid.scrollLeft / (scrollWidth - clientW);

              // compute thumb width in px to allow precise left calculation
              const trackWidth = scrollbar.clientWidth || clientW;
              const thumbWidthPx = Math.max(
                6,
                Math.round(trackWidth * thumbPercent),
              );
              thumb.style.width = thumbWidthPx + "px";

              const maxTranslatePx = Math.max(0, trackWidth - thumbWidthPx);
              const translateXPx = Math.round(leftRatio * maxTranslatePx);
              // set transform in px for smoother motion
              thumb.style.transform = `translateX(${translateXPx}px)`;
            });
          };

          // Update on scroll & resize
          grid.addEventListener("scroll", update, { passive: true });
          window.addEventListener("resize", update);

          // initial update after layout
          setTimeout(update, 80);

          // ensure update runs after images load (prevents thumb size jumps)
          const imgs = grid.querySelectorAll("img");
          imgs.forEach((img) => {
            if (!img.complete) img.addEventListener("load", update);
          });

          // Dragging logic using pointer events
          let dragging = false;
          let startX = 0;
          let startScrollLeft = 0;

          const onPointerDown = (e) => {
            e.preventDefault();
            dragging = true;
            startX = e.clientX;
            startScrollLeft = grid.scrollLeft;
            // compute some metrics
            const trackRect = scrollbar.getBoundingClientRect();
            const thumbRect = thumb.getBoundingClientRect();
            const trackWidth = trackRect.width;
            const thumbWidth = thumbRect.width;
            const maxTranslatePx = trackWidth - thumbWidth;
            const maxScrollLeft = grid.scrollWidth - grid.clientWidth;

            const onPointerMove = (ev) => {
              if (!dragging) return;
              ev.preventDefault();
              const dx = ev.clientX - startX;
              // determine current thumb left in px based on startScrollLeft
              const startLeftRatio = startScrollLeft / (maxScrollLeft || 1);
              const startThumbLeftPx = startLeftRatio * maxTranslatePx;
              let newLeftPx = startThumbLeftPx + dx;
              newLeftPx = Math.max(0, Math.min(maxTranslatePx, newLeftPx));
              const proportion =
                maxTranslatePx > 0 ? newLeftPx / maxTranslatePx : 0;
              const newScrollLeft = proportion * maxScrollLeft;
              // set scrollLeft directly but throttle visual update
              grid.scrollLeft = newScrollLeft;
            };

            const onPointerUp = (ev) => {
              dragging = false;
              document.removeEventListener("pointermove", onPointerMove);
              document.removeEventListener("pointerup", onPointerUp);
            };

            document.addEventListener("pointermove", onPointerMove, {
              passive: false,
            });
            document.addEventListener("pointerup", onPointerUp);
          };

          thumb.addEventListener("pointerdown", onPointerDown);
          // Click on track to jump
          scrollbar.addEventListener("click", (ev) => {
            // ignore clicks on thumb (handled by drag)
            if (ev.target === thumb) return;
            const rect = scrollbar.getBoundingClientRect();
            const clickX = ev.clientX - rect.left;
            const trackWidth = rect.width;
            const thumbWidth = thumb.getBoundingClientRect().width;
            const maxTranslatePx = trackWidth - thumbWidth;
            const proportion = Math.max(
              0,
              Math.min(1, (clickX - thumbWidth / 2) / maxTranslatePx),
            );
            const maxScrollLeft = grid.scrollWidth - grid.clientWidth;
            grid.scrollTo({
              left: proportion * maxScrollLeft,
              behavior: "smooth",
            });
          });
        })();
      });
      let lastScrollTop = 0;
      const navbar = document.querySelector(".navbar");

      window.addEventListener("scroll", function () {
        let scrollTop =
          window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > lastScrollTop && scrollTop > 50) {
          navbar.classList.add("hidden"); // Aşağı kaydırınca gizle
        } else {
          navbar.classList.remove("hidden"); // Yukarı kaydırınca göster
        }
        lastScrollTop = scrollTop;
      });

      // Hamburger Menü Toggle
      const hamburger = document.getElementById("hamburger");
      const mobileMenu = document.getElementById("mobileMenu");

      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("active");
        mobileMenu.classList.toggle("active");
      });

      // Mobil menü linklerine tıklandığında menüyü kapat
      const mobileMenuLinks = document.querySelectorAll(".mobile-menu a");
      mobileMenuLinks.forEach((link) => {
        link.addEventListener("click", () => {
          hamburger.classList.remove("active");
          mobileMenu.classList.remove("active");
        });
      });
    </script>
  </body>
</html>
