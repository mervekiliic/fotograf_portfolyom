<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merve Kılıç | Portfolyo</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      /* 1. SAYFA GENELİ */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000; /* Siyah arka plan */
        color: #fff; /* Beyaz yazı */
        font-family: "Arial", sans-serif;
        overflow-x: hidden;
      }

      /* 2. ÜST MENÜ (NAVBAR) */
      .navbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between; /* Logo solda, linkler sağda kalır */
        align-items: center;
        padding: 30px 50px;
        box-sizing: border-box;
        z-index: 100;
        transition:
          transform 0.4s ease,
          opacity 0.4s ease;
        z-index: 1000;
      }

      .nav-logo {
        font-size: 1.2rem;
        letter-spacing: 2px;
        font-weight: bold;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 30px;
        margin-left: auto; /* Linkleri sağa doğru iter */
        margin-right: 70px; /* IG ikonuyla arasına boşluk koyar */
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        opacity: 0.8;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1; /* Üzerine gelince parlar */
      }
      .navbar.hidden {
        transform: translateY(-100%);
        opacity: 0;
      }

      /* 3. GİRİŞ BÖLÜMÜ (HERO) */
      .hero {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: flex-end; /* Yazıyı sağa yaslar */
        align-items: center;
        padding-right: 10%; /* Sağdan estetik boşluk */
      }

      /* 4. ARKA PLAN FOTOĞRAFI */
      .hero-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 20% center; /* Fotoğrafı sola kaydırır */
        opacity: 0.5; /* Yazının netliği için biraz daha kararttık */
        z-index: 1;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 70%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      /* 5. YAZI ALANI */
      .hero-text {
        position: relative;
        z-index: 2;
        text-align: right; /* Yazıları kendi içinde sağa hizalar */
        position: relative;
        left: 0; /* Sadece yazıları bağımsız olarak sağa iter */
      }

      h1 {
        font-size: 3.5rem;
        margin: 0;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: bold;
      }

      p {
        font-size: 1.2rem;
        letter-spacing: 8px;
        margin-top: 10px;
        color: #ccc;
      }
      /* 📸 6. GALERİ TASARIMI (RECENT WORKS) */
      .recent-works {
        padding: 50px 50px;
        background-color: #000;
        text-align: center;
      }

      .section-title {
        font-size: 2.5rem;
        font-weight: 300;
        letter-spacing: 5px;
        margin-bottom: 60px;
        text-transform: uppercase;
      }

      .works-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 4 eşit sütun oluşturur */
        gap: 20px; /* Kareler arası boşluk */
        margin-top: 60px; /* Başlıktan aşağıya doğru 60px itelim ⬇️ */
        padding: 0 50px;
      }

      .work-item {
        position: relative;
        height: 100px; /* Karelerin yüksekliği */
        overflow: hidden;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        aspect-ratio: 2/3; /* Tüm fotoğrafları aynı boyutta (dikey) tutar 📏 */
        display: flex; /* İçeriği yönetmek için */
        align-items: center; /* Dikeyde tam ortalar 🎯 */
        justify-content: center; /* Yatayda tam ortalar */
        background-color: #0a0a0a; /* Boşlu
            }

            .work-item img {
              width: 70%;
              height: 70%;
              object-fit: cover; /* Fotoğrafı kareye sığdırır */
        transition: transform 0.5s ease;
      }

      /* Yazı Katmanı (Overlay) Düzenlemesi */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(
          0,
          0,
          0,
          0.5
        ); /* Fotoğrafı hafifçe karartarak yazıyı ön plana çıkarır */
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 1; /* Yazı her zaman görünsün */
        transition: background 0.3s ease;
      }

      /* Kategori Başlık Yazısı Stili */
      .work-overlay span {
        color: #ffffff !important; /* Yazı rengini tam beyaz yapıyoruz */
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
        text-align: center;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8); /* Yazının arkasına hafif gölge ekleyerek netliği artırır */
      }

      /* Üzerine gelince (Hover) efekti */
      .work-item:hover .work-overlay {
        background: rgba(
          0,
          0,
          0,
          0.2
        ); /* Üzerine gelince fotoğraf biraz daha aydınlanır */
      }

      /* ✨ ETKİLEŞİM: Üzerine gelince fotoğraf hafif büyüsün */
      .work-item:hover img {
        transform: scale(1.1);
      }
      /* Galeriyi 2x2 veya yan yana dizmek için (4 kategori olduğu için) */
      .works-grid {
        display: grid;
        grid-template-columns: repeat(
          auto-fit,
          minmax(300px, 1fr)
        ); /* Ekran boyutuna göre 2 veya 4 sıralar */
        gap: 20px;
        padding: 20px;
      }

      .work-item {
        position: relative;
        height: 500px;
        overflow: hidden;
        background: #111;
      }

      /* Üzerine gelince kategori isminin görünümü */
      .work-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none; /* Altındaki kaydırma işlemini engellemez */
        transition: 0.3s;
      }

      .work-overlay span {
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
      }

      .work-item:hover .work-overlay {
        background: rgba(0, 0, 0, 0.2); /* Üzerine gelince biraz aydınlanır */
      }
      /* Yazıların başlangıç hali (görünmez ve aşağıda) */
      h1,
      p {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 1s ease-out forwards;
      }
      /* Meslek yazısı (p) biraz daha geç gelsin ki estetik dursun */
      .hero-text p {
        animation-delay: 0.5s;
      }

      /* Kayma Animasyonu Tanımı */
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Sosyal Medya İkonu Stili */
      .social-link {
        color: #ffffff; /* Rengi beyaz yap */
        font-size: 2rem; /* Boyutu büyüt (İstediğin gibi değiştirebilirsin: 1.2rem, 2rem vs.) */
        text-decoration: none; /* Alt çizgiyi kaldır */
        transition: all 0.3s ease; /* Yumuşak geçiş efekti */
        display: flex; /* Hizalama için */
        align-items: center;
        margin-right: 50px;
      }

      /* Üzerine gelince ne olsun? */
      .social-link:hover {
        color: #cccccc; /* Rengi hafif grileştir */
        transform: translateY(-3px); /* Hafifçe yukarı hareket ettir */
      }
      .lang-switcher {
        margin-left: 25px;
        font-size: 11px;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.5; /* Seçili olmayanlar daha sönük durur */
        transition: all 0.3s ease;
        position: relative;
        padding-bottom: 2px;
      }

      /* Üzerine gelince parlama */
      .lang-switcher span:hover {
        opacity: 1;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      }

      /* Aktif (Seçili) Dilin Stili */
      .lang-switcher span.active {
        opacity: 1;
        border-bottom: 1px solid white; /* Altına ince bir çizgi çeker */
      }

      .lang-switcher .separator {
        cursor: default;
        opacity: 0.3;
      }
      #nav-contact {
        cursor: pointer;
        transition: opacity 0.3s ease;
      }

      #nav-contact:hover {
        opacity: 0.6; /* Üzerine gelince hafifçe sönerek tepki verir */
      }
      @media (max-width: 768px) {
        /* 1. Navbar'ı tekrar tek satır ve zarif yapıyoruz */
        .navbar {
          flex-direction: row !important; /* Yan yana dizilimi geri getirdik */
          justify-content: space-between !important;
          padding: 20px 15px !important;
          background: transparent !important; /* O siyah gölgeyi kaldırdık */
        }

        /* 2. Logoyu küçültüyoruz */
        .nav-logo {
          font-size: 0.9rem !important;
        }

        /* 3. Menü linklerini tek bir satıra sığdırıyoruz */
        .nav-links {
          display: flex !important;
          flex-direction: row !important;
          gap: 10px !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        .nav-links a {
          font-size: 8px !important; /* Çok küçük ama sığması için kritik */
          letter-spacing: 1px !important;
        }

        /* 4. Sosyal medya ve Dil seçeneklerini gizle ya da küçült */
        /* Tasarımı ferahlatmak için mobilde bunları navbar dışına alabiliriz */
        .nav-social,
        .lang-switcher {
          display: none !important; /* Menüyü çok kalabalık yapıyorsa mobilde gizleyebiliriz */
        }

        /* 5. İsmini ve başlığı tam merkeze alıyoruz */
        .hero {
          justify-content: center !important;
          padding-right: 0 !important;
        }

        .hero-text {
          left: 0 !important;
          text-align: center !important;
          width: 100%;
        }

        h1 {
          font-size: 1.8rem !important;
          letter-spacing: 6px !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">TheArtOfMerve</div>
      <ul class="nav-links">
        <li>
          <a href="#portfolio" class="lang-key" id="nav-portfolio">Portfolio</a>
        </li>
        <li>
          <a href="about.html" class="nav-link lang-key" id="nav-about"
            >ABOUT</a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="lang-key"
            id="nav-contact"
            style="text-decoration: none; color: inherit"
            >CONTACT</a
          >
        </li>
      </ul>
      <div class="nav-social">
        <a
          href="https://www.instagram.com/mervisualss/"
          target="_blank"
          class="social-link"
        >
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>
      <div class="lang-switcher">
        <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
        <span class="separator">|</span>
        <span onclick="setLanguage('en')" id="lang-en">EN</span>
      </div>
    </nav>

    <section class="hero">
      <img src="back.webp" class="hero-bg" alt="Kapak Fotoğrafı" />
      <div class="hero-text">
        <h1>Merve Kılıç</h1>
        <p class="lang-key" id="hero-sub">PHOTOGRAPHY</p>
      </div>
    </section>

    <section id="portfolio" class="recent-works">
      <h2 class="section-title lang-key" id="section-works">Recent Works</h2>
      <div class="works-grid">
        <a href="architectural.html" class="work-item">
          <img src="kapak1.webp" alt="mimari" />
          <div class="work-overlay">
            <span class="lang-key" id="work-arch">architectural</span>
          </div>
        </a>

        <a href="product.html" class="work-item">
          <img src="kapak2.webp" alt="ürün" />
          <div class="work-overlay">
            <span class="lang-key" id="work-prod">product</span>
          </div>
        </a>

        <a href="nature.html" class="work-item">
          <img src="kapak3.webp" alt="doğa" />
          <div class="work-overlay">
            <span class="lang-key" id="work-nature">nature</span>
          </div>
        </a>

        <a href="light-shadow.html" class="work-item">
          <img src="kapak4.webp" alt="ışıkgölge" />
          <div class="work-overlay">
            <span class="lang-key" id="work-light">light&shadow</span>
          </div>
        </a>
      </div>
    </section>
    <script>
      // 1. Sözlüğümüzü hazırlıyoruz (Her ID'nin karşılığını yazıyoruz)
      const translations = {
        en: {
          "nav-portfolio": "Portfolio",
          "nav-about": "ABOUT",
          "nav-contact": "Contact",
          "hero-sub": "PHOTOGRAPHY",
          "section-works": "Recent Works",
          "work-arch": "architectural",
          "work-prod": "product",
          "work-nature": "nature",
          "work-light": "light&shadow",
        },
        tr: {
          "nav-portfolio": "Portfolyo",
          "nav-about": "HAKKIMDA",
          "nav-contact": "İletişim",
          "hero-sub": "FOTOĞRAFÇILIK",
          "section-works": "Son Çalışmalar",
          "work-arch": "mimari",
          "work-prod": "ürün",
          "work-nature": "doğa",
          "work-light": "ışık & gölge",
        },
      };
      // 2. Dili değiştiren fonksiyon
      function setLanguage(lang) {
        // Tüm 'lang-key' sınıfına sahip öğeleri bul
        const elements = document.querySelectorAll(".lang-key");

        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        // --- YENİ EKLENEN KISIM BURASI ---
        // Önce her iki butondan da 'active' sınıfını çıkarıyoruz
        document.getElementById("lang-tr").classList.remove("active");
        document.getElementById("lang-en").classList.remove("active");

        // Sonra seçilen dile (lang) 'active' sınıfını ekliyoruz
        document.getElementById("lang-" + lang).classList.add("active");
        // --------------------------------

        // Seçimi hafızaya kaydet
        localStorage.setItem("selectedLang", lang);
      }

      // 3. Sayfa açıldığında son seçilen dili kontrol et
      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);
      });
      let lastScrollTop = 0;
      const navbar = document.querySelector(".navbar");

      window.addEventListener("scroll", function () {
        let scrollTop =
          window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > lastScrollTop && scrollTop > 50) {
          navbar.classList.add("hidden"); // Aşağı kaydırınca gizle
        } else {
          navbar.classList.remove("hidden"); // Yukarı kaydırınca göster
        }
        lastScrollTop = scrollTop;
      });
    </script>
  </body>
</html>
