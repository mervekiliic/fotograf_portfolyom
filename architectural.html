<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architectural | Merve Kılıç</title>
    <style>
      /* 1. SAYFA GENELİ */
      * {
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
      }

      body {
        background-color: #000;
        color: #fff;
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: clamp(15px, 5vw, 40px);
        overflow-x: hidden;
      }

      /* 1.5 BAŞLIK RESPONSİF STİL */
      h1 {
        font-size: clamp(1.5rem, 8vw, 3.5rem);
        letter-spacing: clamp(2px, 2vw, 10px);
        margin: 0 0 clamp(20px, 5vw, 50px) 0;
        word-wrap: break-word;
        overflow-wrap: break-word;
        hyphens: auto;
        font-weight: 300;
      }

      /* 2. GERİ DÖN BUTONU */
      .back-button,
      .back-button:link,
      .back-button:visited,
      .back-button:active {
        display: inline-block;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.6) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 5px 0;
        font-size: clamp(14px, 3vw, 20px);
        letter-spacing: clamp(1px, 1.5vw, 3px);
        text-transform: uppercase;
        margin-bottom: clamp(30px, 8vw, 60px);
        transition: all 0.4s ease;
      }

      .back-button:hover {
        color: #fff !important;
        border-bottom: 1px solid #fff;
        padding-left: 10px; /* Fareyle üzerine gelince sağa kayma efekti */
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* index.html'deki o şık parlama */
      }

      .gallery {
        column-count: 3;
        column-gap: clamp(10px, 3vw, 20px);
        padding-bottom: clamp(30px, 5vw, 50px);
      }

      /* 2. Resimlerin kutusunu sabitle */
      .gallery-item {
        display: inline-block;
        width: 100%;
        margin-bottom: clamp(15px, 3vw, 20px);
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 0.8s ease-out forwards;
        backface-visibility: hidden;
        -webkit-column-break-inside: avoid;
        break-inside: avoid;
      }

      /* 3. Hover efektini sadeleştir ve zorla */
      .gallery-item img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        /* Resmin kaybolmasını engelleyen en önemli satır: */
        transform: translateZ(0);
        will-change: transform;
      }

      .gallery-item:hover img {
        /* Ölçeği çok az küçültüyoruz (1.03 -> 1.02) daha stabil olması için */
        transform: scale(1.02) translateZ(0);
        opacity: 1 !important;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* RESPONSIVE BREAKPOINT'LER */
      /* Tablet & Desktop Orta (900px+) */
      @media (max-width: 1024px) {
        .gallery {
          column-count: 2;
        }
      }

      /* Tablet (768px - 1024px) */
      @media (max-width: 768px) {
        .gallery {
          column-count: 2;
        }
      }

      /* Telefon Orta (480px - 600px) */
      @media (max-width: 600px) {
        .gallery {
          column-count: 1;
          column-gap: 0;
        }
      }

      /* Telefon Küçük (<480px) */
      @media (max-width: 480px) {
        body {
          padding: clamp(10px, 3vw, 15px);
        }
      }

      /* Dil Butonları Sağ Üst Sabit Konum */
      .lang-switcher {
        position: fixed;
        right: clamp(15px, 4vw, 40px);
        top: clamp(15px, 3vw, 35px);
        display: flex;
        gap: clamp(8px, 2vw, 12px);
        font-size: clamp(8px, 2vw, 11px);
        letter-spacing: clamp(1px, 1vw, 2px);
        z-index: 9999;
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.4;
        color: white;
        transition: all 0.3s ease;
        padding-bottom: 2px;
      }

      /* Aktif veya üzerine gelinen dilin parlaması */
      .lang-switcher span:hover,
      .lang-switcher span.active {
        opacity: 1;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      /* Seçili dilin altına ince çizgi */
      .lang-switcher span.active {
        border-bottom: 1px solid white;
      }

      .lang-switcher .separator {
        opacity: 0.2;
        cursor: default;
        color: white;
      }

      /* NEXT CATEGORY SEÇİMİ */
      .next-category-section {
        margin-top: clamp(50px, 10vw, 100px);
        text-align: center;
        border-top: 1px solid #222;
        padding-top: clamp(30px, 5vw, 50px);
      }

      .next-cat-label {
        font-size: clamp(14px, 3vw, 20px);
        letter-spacing: clamp(1px, 1.5vw, 2px);
        color: #555;
      }

      .next-cat-link {
        color: #fff;
        text-decoration: none;
        font-size: clamp(1.2rem, 6vw, 2rem);
        letter-spacing: clamp(2px, 2vw, 5px);
        text-transform: uppercase;
        display: inline-block;
        transition: all 0.3s ease;
      }

      .next-cat-link:hover {
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="lang-switcher">
      <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
      <span class="separator">|</span>
      <span onclick="setLanguage('en')" id="lang-en">EN</span>
    </div>
    <a href="index.html" class="lang-key back-button" id="back-to-portfolio"
      >← PORTFOLIO</a
    >
    <h1
      class="lang-key"
      id="arch-page-title"
    >
      ARCHITECTURAL
    </h1>

    <div class="gallery">
      <div class="gallery-item">
        <img src="photomimari1.webp" alt="1" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="photomimari2.webp" alt="2" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="photomimari3.webp" alt="3" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="mimariphoto.webp" alt="4" loading="lazy" decoding="async" />
      </div>
    </div>
    <div class="next-category-section">
      <p
        class="lang-key next-cat-label"
        id="next-cat-label"
      >
        NEXT CATEGORY
      </p>
      <a
        href="product.html"
        class="lang-key next-cat-link"
        id="next-cat-product"
      >
        PRODUCT →
      </a>
    </div>
    <script>
      const translations = {
        en: {
          "back-to-portfolio": "← PORTFOLIO",
          "arch-page-title": "ARCHITECTURAL",
          "next-cat-label": "NEXT CATEGORY",
          "next-cat-product": "PRODUCT →",
        },
        tr: {
          "back-to-portfolio": "← PORTFOLYO",
          "arch-page-title": "MİMARİ",
          "next-cat-label": "SIRADAKİ KATEGORİ",
          "next-cat-product": "ÜRÜN →",
        },
      };

      function setLanguage(lang) {
        const elements = document.querySelectorAll(".lang-key");

        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang] && translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        // Sağ üstteki TR | EN butonlarının aktiflik stilini güncelle
        const btnTr = document.getElementById("lang-tr");
        const btnEn = document.getElementById("lang-en");

        if (btnTr && btnEn) {
          btnTr.classList.remove("active");
          btnEn.classList.remove("active");
          const activeBtn = document.getElementById("lang-" + lang);
          if (activeBtn) activeBtn.classList.add("active");
        }

        localStorage.setItem("selectedLang", lang);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);
      });
    </script>
  </body>
</html>
