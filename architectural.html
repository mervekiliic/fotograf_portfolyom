<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architectural | Merve Kılıç</title>
    <style>
      /* 1. SAYFA GENELİ */
      * {
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
      }

      body {
        background-color: #000;
        color: #fff;
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 40px;
        overflow-x: hidden;
      }

      /* 1.5 BAŞLIK RESPONSİF STİL */
      h1 {
        font-size: 3.5rem;
        letter-spacing: 10px;
        margin: 0 0 50px 0;
        word-wrap: break-word;
        overflow-wrap: break-word;
        hyphens: auto;
      }

      /* 2. GERİ DÖN BUTONU */
      .back-button,
      .back-button:link,
      .back-button:visited,
      .back-button:active {
        display: inline-block;
        text-decoration: none;
        /* Rengi beyaza sabitliyoruz, morluğu engelliyoruz */
        color: rgba(255, 255, 255, 0.6) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 5px 0;
        font-size: 20px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 60px;
        transition: all 0.4s ease;
      }

      .back-button:hover {
        color: #fff !important;
        border-bottom: 1px solid #fff;
        padding-left: 10px; /* Fareyle üzerine gelince sağa kayma efekti */
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* index.html'deki o şık parlama */
      }

      .gallery {
        column-count: 3;
        column-gap: 20px;
        padding-bottom: 50px;
      }

      /* 2. Resimlerin kutusunu sabitle */
      .gallery-item {
        display: inline-block;
        width: 100%;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 0.8s ease-out forwards;
        backface-visibility: hidden;
        -webkit-column-break-inside: avoid;
        break-inside: avoid;
      }

      /* 3. Hover efektini sadeleştir ve zorla */
      .gallery-item img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        /* Resmin kaybolmasını engelleyen en önemli satır: */
        transform: translateZ(0);
        will-change: transform;
      }

      .gallery-item:hover img {
        /* Ölçeği çok az küçültüyoruz (1.03 -> 1.02) daha stabil olması için */
        transform: scale(1.02) translateZ(0);
        opacity: 1 !important;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 4. SIRALI GİRİŞ ANİMASYONU (Delay) */
      .gallery-item:nth-child(1) {
        animation-delay: 0.1s;
      }
      .gallery-item:nth-child(2) {
        animation-delay: 0.2s;
      }
      .gallery-item:nth-child(3) {
        animation-delay: 0.3s;
      }
      .gallery-item:nth-child(4) {
        animation-delay: 0.4s;
      }
      .gallery-item:nth-child(5) {
        animation-delay: 0.5s;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 5. MOBİL UYUMLULUK */
      @media (max-width: 900px) {
        .gallery {
          column-count: 2;
        }
        h1 {
          font-size: 2.5rem;
          letter-spacing: 6px;
        }
      }
      @media (max-width: 600px) {
        body {
          padding: 20px;
        }
        h1 {
          font-size: 1.8rem;
          letter-spacing: 3px;
          margin-bottom: 30px;
        }
        .gallery {
          column-count: 1;
          column-gap: 0;
        }
      }

      /* Dil Butonları Sağ Üst Sabit Konum */
      .lang-switcher {
        position: fixed; /* Sayfa kaysa da sağ üstte çakılı kalır */
        right: 40px; /* Sağdan boşluk */
        top: 35px; /* Üstten boşluk */
        display: flex;
        gap: 12px;
        font-size: 11px;
        letter-spacing: 2px;
        z-index: 9999; /* Her şeyin en üstünde durur */
      }

      .lang-switcher span {
        cursor: pointer;
        opacity: 0.4;
        color: white;
        transition: all 0.3s ease;
        padding-bottom: 2px;
      }

      /* Aktif veya üzerine gelinen dilin parlaması */
      .lang-switcher span:hover,
      .lang-switcher span.active {
        opacity: 1;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      /* Seçili dilin altına ince çizgi */
      .lang-switcher span.active {
        border-bottom: 1px solid white;
      }

      .lang-switcher .separator {
        opacity: 0.2;
        cursor: default;
        color: white;
      }
      @media (max-width: 768px) {
        .back-nav,
        .lang-switcher {
          top: 20px;
          font-size: 10px;
        }
        .back-nav {
          left: 20px;
        }
        .lang-switcher {
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="lang-switcher">
      <span onclick="setLanguage('tr')" id="lang-tr">TR</span>
      <span class="separator">|</span>
      <span onclick="setLanguage('en')" id="lang-en">EN</span>
    </div>
    <a href="index.html" class="lang-key back-button" id="back-to-portfolio"
      >← PORTFOLIO</a
    >
    <h1
      class="lang-key"
      id="arch-page-title"
      style="letter-spacing: 10px; font-weight: 300; margin-bottom: 50px"
    >
      ARCHITECTURAL
    </h1>

    <div class="gallery">
      <div class="gallery-item">
        <img src="photomimari1.webp" alt="1" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="photomimari2.webp" alt="2" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="photomimari3.webp" alt="3" loading="lazy" decoding="async" />
      </div>
      <div class="gallery-item">
        <img src="mimariphoto.webp" alt="4" loading="lazy" decoding="async" />
      </div>
    </div>
    <div
      style="
        margin-top: 100px;
        text-align: center;
        border-top: 1px solid #222;
        padding-top: 50px;
      "
    >
      <p
        class="lang-key"
        id="next-cat-label"
        style="font-size: 20px; letter-spacing: 2px; color: #555"
      >
        NEXT CATEGORY
      </p>
      <a
        href="product.html"
        class="lang-key"
        id="next-cat-product"
        style="
          color: #fff;
          text-decoration: none;
          font-size: 2rem;
          letter-spacing: 5px;
          text-transform: uppercase;
        "
      >
        PRODUCT →
      </a>
    </div>
    <script>
      const translations = {
        en: {
          "back-to-portfolio": "← PORTFOLIO",
          "arch-page-title": "ARCHITECTURAL",
          "next-cat-label": "NEXT CATEGORY",
          "next-cat-product": "PRODUCT →",
        },
        tr: {
          "back-to-portfolio": "← PORTFOLYO",
          "arch-page-title": "MİMARİ",
          "next-cat-label": "SIRADAKİ KATEGORİ",
          "next-cat-product": "ÜRÜN →",
        },
      };

      function setLanguage(lang) {
        const elements = document.querySelectorAll(".lang-key");

        elements.forEach((el) => {
          const id = el.getAttribute("id");
          if (translations[lang] && translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        // Sağ üstteki TR | EN butonlarının aktiflik stilini güncelle
        const btnTr = document.getElementById("lang-tr");
        const btnEn = document.getElementById("lang-en");

        if (btnTr && btnEn) {
          btnTr.classList.remove("active");
          btnEn.classList.remove("active");
          const activeBtn = document.getElementById("lang-" + lang);
          if (activeBtn) activeBtn.classList.add("active");
        }

        localStorage.setItem("selectedLang", lang);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const savedLang = localStorage.getItem("selectedLang") || "en";
        setLanguage(savedLang);
      });
    </script>
  </body>
</html>
